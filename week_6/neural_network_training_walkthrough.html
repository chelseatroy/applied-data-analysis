    <p style="font-family:monospace;margin-left:1em;font-size:0.95em">

  },

    nh:'ws', rp:'sigmoid',
    title: "Step 4 — The Sigmoid Activation Function",
    html: `<p>The raw weighted sum <em>z</em> is passed through the <b>sigmoid function</b>
    to produce the neuron's output activation <em>a</em>:</p>
    <p style="font-family:monospace;margin-left:1em;font-size:0.95em">
      σ(z) = 1 / (1 + e<sup>−z</sup>)
    </p>

    to interpret activations as probabilities.</p>
    <p>Crucially, sigmoid is <em>smooth and differentiable everywhere</em>.
    This is what makes gradient descent work: small changes in weights produce
    small, predictable changes in output. The gold dot shows the example from Step 3.</p>`

    <p>In a perfectly trained network, the correct class fires at 1.0 and all others

    nh:'output', rp:'cost',

    For the image of "5", the correct output neuron should fire at <b>1.0</b>;
    all others should be <b>0.0</b>. Instead, everything is near 0.5.</p>
    <p>The <b>quadratic cost</b> (MSE) measures the total squared gap between
    what the network output and what it should have output, across all output neurons:</p>
    <p style="font-family:monospace;margin-left:1em;font-size:0.95em">
      C = (1/2n) &nbsp;Σ &nbsp;‖ y(x) − a(x) ‖²

    in the direction that decreases C.</p>
    <p><b>Stochastic gradient descent (SGD)</b> estimates the gradient from a random
    <em>mini-batch</em> of ~10 images rather than all 60,000 — much faster and often
    finds better solutions than full-batch descent.</p>
    <p><b>Backpropagation</b> is the algorithm that efficiently computes all those
    gradients by flowing the error signal backwards through the network, layer by layer.

    html: `<p><b>Activation: ReLU instead of sigmoid.</b>
    ReLU (Rectified Linear Unit) — max(0, z) — is the modern default.
    It trains faster and avoids the <em>vanishing gradient</em> problem: sigmoid
    squashes all inputs into (0, 1), so gradients shrink as they travel through
    many layers, slowing learning. ReLU's gradient is either 0 or 1 — it doesn't shrink.</p>
    <p><b>Architecture: deeper and convolutional.</b>
    Adding more hidden layers lets the network learn hierarchical features
    (edges → shapes → digit parts). <em>Convolutional</em> layers exploit the
    spatial structure of images — nearby pixels are related — and push MNIST
    accuracy above 99%.</p>
    <p><b>Optimizer: Adam instead of vanilla SGD.</b>
    Adam adapts the learning rate per parameter and converges in far fewer epochs.</p>
    <p><b>Regularization: dropout and batch normalization</b> prevent overfitting
    and stabilize training in deep networks.</p>
    <p style="color:#806050;font-style:italic;font-size:0.9em;margin-top:6px">
      Nielsen covers all of this in Chapters 2–6 of the same book.</p>`

// ─── Node opacity helper ───────────────────────────────────────────────────────
function getOp(layer, nh) {
  if (nh==='none') return 0.35;
  if (nh==='all')  return 1.0;
  const active = {
    input:     ['input'],
    hidden:    ['hidden'],
    output:    ['output'],
    ws:        ['input','hidden'],
    forward_h: ['input','hidden'],
    forward_o: ['input','hidden','output'],
  }[nh] || [];
  return active.includes(layer) ? 1.0 : 0.2;
}

        stroke: wsHi ? GOLD : ICOL,
        'stroke-width': wsHi ? 1.2 : 0.6,
        opacity: wsHi ? 0.65 :
                 (nh==='forward_h'||nh==='forward_o'||nh==='all') ? 0.18 : 0.07
      }));
    });
  });

  // ── Connections hidden → output ──
  HNY.forEach(hy => {
    ONY.forEach(oy => {
      svg.appendChild(el('line',{
        x1:HNX+8, y1:hy, x2:ONX-8, y2:oy,
        stroke: HCOL, 'stroke-width':0.6,
        opacity: (nh==='forward_o'||nh==='output'||nh==='all') ? 0.22 : 0.05
      }));
    });
  });

  // ── Input nodes ──
  INY.forEach((iy) => {
    svg.appendChild(el('circle',{cx:INX,cy:iy,r:7,fill:ICOL,opacity:iOp*0.9}));
  });
  svg.appendChild(el('text',{x:INX,y:IN_GAP_Y+4,'text-anchor':'middle',
    fill:'#7a5040','font-size':13},'⋮'));

  // ── Hidden nodes ──
  HNY.forEach((hy, hi) => {
    const isWS   = (nh==='ws' && hi===0);
    const showAct = (nh==='forward_h'||nh==='forward_o');
    svg.appendChild(el('circle',{
      cx:HNX, cy:hy, r:isWS?10:7,
      fill:isWS ? GOLD : HCOL,
      opacity:hOp*(isWS?1:0.9)
    }));
    if (showAct) {
      svg.appendChild(el('text',{x:HNX+13,y:hy+4,
        fill:HCOL,'font-size':9,opacity:0.9},HACTS[hi].toFixed(2)));
    }
    if (isWS) {
      svg.appendChild(el('text',{x:HNX+16,y:hy+4,
        fill:GOLD,'font-size':10,'font-weight':'bold'},'σ(z)'));
    }
  });

  // ── Output nodes ──
  ONY.forEach((oy, oi) => {
    const isWin  = (nh==='forward_o'||nh==='output') && oi===5;
    svg.appendChild(el('circle',{
      cx:ONX, cy:oy, r:7,
      fill:isWin ? GOLD : OCOL,
      opacity:oOp*0.9
    }));
    svg.appendChild(el('text',{
      x:ONX+14, y:oy+4,
      fill:isWin ? GOLD : '#7a9070', 'font-size':9
    },String(oi)));
  });

  // ── Layer size labels ──
  svg.appendChild(el('text',{x:INX, y:NH-8,'text-anchor':'middle',
    fill:'#806050','font-size':9,'font-style':'italic'},'784'));
  svg.appendChild(el('text',{x:HNX, y:NH-8,'text-anchor':'middle',
    fill:'#806050','font-size':9,'font-style':'italic'},'30'));
  svg.appendChild(el('text',{x:ONX, y:NH-8,'text-anchor':'middle',
    fill:'#806050','font-size':9,'font-style':'italic'},'10'));

  // ── Diagram title ──
  svg.appendChild(el('text',{x:NW/2,y:14,'text-anchor':'middle',
    fill:'#a06848','font-size':10,'font-style':'italic'},'Network: 784 → 30 → 10'));
}

// ─── Right SVG ────────────────────────────────────────────────────────────────
const RW=340, RH=380;

function renderRight(si) {
  const s   = steps[si];
  const svg = document.getElementById('rightsvg');
  svg.innerHTML = '';
  switch(s.rp) {
    case 'digit':       drawDigit(svg, false); break;
    case 'digit_vals':  drawDigit(svg, true);  break;
    case 'architecture':drawArchitecture(svg); break;
    case 'weighted_sum':drawWeightedSum(svg);  break;
    case 'sigmoid':     drawSigmoid(svg);      break;
    case 'hidden_bars': drawHiddenBars(svg);   break;
    case 'output_bars': drawOutputBars(svg);   break;
    case 'cost':        drawCost(svg);         break;
    case 'loss_curve':  drawCurve(svg, LOSS_CURVE,'Training Loss (30 epochs)',HCOL,0,2.5,false); break;
    case 'accuracy':       drawCurve(svg, ACC_CURVE, 'Test Accuracy (30 epochs)',OCOL,0,100,true); break;
    case 'sigmoid_vs_relu':drawSigmoidVsReLU(svg); break;
  }
}

// ── Digit ──
function drawDigit(svg, showVals) {
  const CS=10, OX=(RW-28*CS)/2, OY=24; // 10px cells, 280×280 grid, centered

  svg.appendChild(el('text',{x:RW/2,y:14,'text-anchor':'middle',
    fill:'#a06848','font-size':11,'font-style':'italic'},
    showVals ? '28×28 pixel values — each cell is one input neuron'
             : 'Handwritten digit "5" (MNIST dataset)'));

  // Draw all 784 cells
  DIGIT5.forEach((row,ri) => {
    row.forEach((val,ci) => {
      const b=Math.round(val*230);
      svg.appendChild(el('rect',{
        x:OX+ci*CS, y:OY+ri*CS,
        width:CS-0.5, height:CS-0.5,
        fill:`rgb(${b},${b},${Math.min(b+12,255)})`
      }));
    });
  });

  if (showVals) {
    // Gold border around one interesting row in the main grid (row 8, cols 18-25)
    const HR=8, C0=18, C1=25;
    svg.appendChild(el('rect',{
      x:OX+C0*CS, y:OY+HR*CS,
      width:(C1-C0+1)*CS, height:CS,
      fill:'none', stroke:GOLD, 'stroke-width':1.5, opacity:0.9
    }));

    // Zoom strip below the grid
    const ZCS=28, ZW=8*ZCS, ZX=(RW-ZW)/2, ZY=OY+28*CS+18;
    svg.appendChild(el('text',{x:RW/2,y:ZY-6,'text-anchor':'middle',
      fill:GOLD,'font-size':9},'↑ row 9 zoomed (cols 19–26)'));

    DIGIT5[HR].slice(C0,C1+1).forEach((val,i) => {
      const x=ZX+i*ZCS;
      const b=Math.round(val*230);
      svg.appendChild(el('rect',{x,y:ZY,width:ZCS-1,height:ZCS-1,
        fill:`rgb(${b},${b},${Math.min(b+12,255)})`,
        stroke:GOLD,'stroke-width':0.5,opacity:0.4}));
      const tf = val>0.5 ? '#1a0a06' : '#e8d0a0';
      svg.appendChild(el('text',{
        x:x+ZCS/2, y:ZY+ZCS-5,
        'text-anchor':'middle',
        fill:tf,'font-size':9,'font-weight':'bold'
      },val.toFixed(2)));

    svg.appendChild(el('text',{x:RW/2,y:ZY+ZCS+12,'text-anchor':'middle',
      fill:'#806050','font-size':9},'28×28 = 784 values → 784 input neurons'));
  } else {
    svg.appendChild(el('text',{x:RW/2,y:OY+28*CS+16,'text-anchor':'middle',
      fill:'#806050','font-size':10},'MNIST: 70,000 labeled images, 28×28 pixels each'));

}

// ── Sigmoid ──
function drawSigmoid(svg) {
  svg.appendChild(el('text',{x:RW/2,y:22,'text-anchor':'middle',
    fill:'#a06848','font-size':11,'font-style':'italic'},'σ(z) = 1 / (1 + e⁻ᶻ)'));

  const ML=46,MR=20,MT=36,MB=38;
  const W=RW-ML-MR, H=RH-MT-MB;
  const ZMN=-5,ZMX=5;

  const px=z=>ML+(z-ZMN)/(ZMX-ZMN)*W;
  const py=v=>MT+H-v*H;

  [-4,-2,0,2,4].forEach(z=>{
    svg.appendChild(el('line',{x1:px(z),y1:MT,x2:px(z),y2:MT+H,
      stroke:'#3a1808','stroke-width':0.5,'stroke-dasharray':'2,4'}));
    svg.appendChild(el('text',{x:px(z),y:MT+H+16,'text-anchor':'middle',fill:TICK,'font-size':10},String(z)));
  });
  [0,0.25,0.5,0.75,1].forEach(v=>{
    svg.appendChild(el('line',{x1:ML,y1:py(v),x2:ML+W,y2:py(v),
      stroke:'#3a1808','stroke-width':0.5,'stroke-dasharray':'2,4'}));
    svg.appendChild(el('text',{x:ML-8,y:py(v)+4,'text-anchor':'end',fill:TICK,'font-size':10},v.toFixed(2)));
  });

  svg.appendChild(el('line',{x1:ML,y1:MT+H,x2:ML+W,y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('line',{x1:ML,y1:MT,x2:ML,y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('text',{x:ML+W/2,y:RH-4,'text-anchor':'middle',fill:TICK,'font-size':11},'z'));
  svg.appendChild(el('text',{x:10,y:MT+H/2+4,'text-anchor':'middle',fill:TICK,'font-size':11,
    transform:`rotate(-90 10 ${MT+H/2})`},'σ(z)'));

  const pts=[];
  for(let z=ZMN;z<=ZMX;z+=0.1)
    pts.push(`${px(z).toFixed(1)},${py(1/(1+Math.exp(-z))).toFixed(1)}`);
  svg.appendChild(el('polyline',{points:pts.join(' '),fill:'none',stroke:HCOL,'stroke-width':2.5}));

  // Example point from Step 3
  const z0=0.9*0.7+0.9*(-0.4)+0.1*0.5+0.0*(-0.2)+0.1;
  const s0=1/(1+Math.exp(-z0));
  svg.appendChild(el('circle',{cx:px(z0),cy:py(s0),r:6,fill:GOLD,stroke:'#1a0a08','stroke-width':1.5}));
  svg.appendChild(el('line',{x1:px(z0),y1:py(s0),x2:px(z0),y2:MT+H,
    stroke:GOLD,'stroke-width':1,'stroke-dasharray':'3,3',opacity:0.6}));
  svg.appendChild(el('line',{x1:ML,y1:py(s0),x2:px(z0),y2:py(s0),
    stroke:GOLD,'stroke-width':1,'stroke-dasharray':'3,3',opacity:0.6}));
  svg.appendChild(el('text',{x:px(z0)+8,y:py(s0)-10,fill:GOLD,'font-size':9.5},
    `z=${z0.toFixed(2)} → σ=${s0.toFixed(2)}`));

  svg.appendChild(el('text',{x:ML+W-4,y:py(0.97)-8,'text-anchor':'end',
    fill:'#706050','font-size':9,'font-style':'italic'},'→ 1 as z → +∞'));
  svg.appendChild(el('text',{x:ML+W-4,y:py(0.03)+16,'text-anchor':'end',
    fill:'#706050','font-size':9,'font-style':'italic'},'→ 0 as z → −∞'));
}

// ── Sigmoid vs ReLU comparison ──
function drawSigmoidVsReLU(svg) {
  svg.appendChild(el('text',{x:RW/2,y:20,'text-anchor':'middle',
    fill:'#a06848','font-size':11,'font-style':'italic'},'Sigmoid vs. ReLU'));

  const ML=46,MR=20,MT=38,MB=44;
  const W=RW-ML-MR, H=RH-MT-MB;
  const ZMN=-4,ZMX=4,YMN=0,YMX=4;

  const px=z=>ML+(z-ZMN)/(ZMX-ZMN)*W;
  const py=v=>MT+H-(v-YMN)/(YMX-YMN)*H;

  // Grid
  [-3,-2,-1,0,1,2,3].forEach(z=>{
    svg.appendChild(el('line',{x1:px(z),y1:MT,x2:px(z),y2:MT+H,
      stroke:'#3a1808','stroke-width':0.5,'stroke-dasharray':'2,4'}));
    svg.appendChild(el('text',{x:px(z),y:MT+H+16,'text-anchor':'middle',fill:TICK,'font-size':10},String(z)));
  });
  [0,1,2,3].forEach(v=>{
    svg.appendChild(el('line',{x1:ML,y1:py(v),x2:ML+W,y2:py(v),
      stroke:'#3a1808','stroke-width':0.5,'stroke-dasharray':'2,4'}));
    svg.appendChild(el('text',{x:ML-8,y:py(v)+4,'text-anchor':'end',fill:TICK,'font-size':10},String(v)));
  });

  // Axes
  svg.appendChild(el('line',{x1:ML,y1:MT+H,x2:ML+W,y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('line',{x1:ML,y1:MT,   x2:ML,   y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('text',{x:ML+W/2,y:MT+H+30,'text-anchor':'middle',fill:TICK,'font-size':11},'z (weighted sum)'));

  // Sigmoid curve
  const sigPts=[];
  for(let z=ZMN;z<=ZMX;z+=0.08)
    sigPts.push(`${px(z).toFixed(1)},${py(1/(1+Math.exp(-z))).toFixed(1)}`);
  svg.appendChild(el('polyline',{points:sigPts.join(' '),fill:'none',stroke:HCOL,'stroke-width':2.5}));

  // ReLU curve
  const reluPts=[`${px(ZMN)},${py(0)}`, `${px(0)},${py(0)}`, `${px(YMX)},${py(YMX)}`];
  svg.appendChild(el('polyline',{points:reluPts.join(' '),fill:'none',stroke:OCOL,'stroke-width':2.5}));

  // Legend
  const ly=MT+12;
  svg.appendChild(el('line',{x1:ML+4,y1:ly,x2:ML+24,y2:ly,stroke:HCOL,'stroke-width':2.5}));
  svg.appendChild(el('text',{x:ML+28,y:ly+4,fill:HCOL,'font-size':10},'σ(z) — sigmoid (Chapter 1)'}));
  svg.appendChild(el('line',{x1:ML+4,y1:ly+18,x2:ML+24,y2:ly+18,stroke:OCOL,'stroke-width':2.5}));
  svg.appendChild(el('text',{x:ML+28,y:ly+22,fill:OCOL,'font-size':10},'max(0, z) — ReLU (modern)'}));

  // Annotations
  svg.appendChild(el('text',{x:px(3.2),y:py(0.95)-10,'text-anchor':'middle',
    fill:HCOL,'font-size':8.5,'font-style':'italic'},'saturates → 1'));
  svg.appendChild(el('text',{x:px(3.2),y:py(3.2)-10,'text-anchor':'middle',
    fill:OCOL,'font-size':8.5,'font-style':'italic'},'stays linear'));
}

// ── Cost ──
function drawCost(svg) {
  svg.appendChild(el('text',{x:RW/2,y:15,'text-anchor':'middle',
    fill:'#a06848','font-size':10,'font-style':'italic'},
    'Before training — random weights, confused outputs'));

  const ML=50, MR=16, MT=24, n=10;
  const W=RW-ML-MR; // 274px
  const barH=14, gap=4;
  const chartH=n*(barH+gap)-gap; // 176px

  // Dashed line at target = 1.0 (where digit 5 should be)
  svg.appendChild(el('line',{x1:ML+W,y1:MT,x2:ML+W,y2:MT+chartH,
    stroke:GOLD,'stroke-width':1,'stroke-dasharray':'3,3',opacity:0.55}));
  svg.appendChild(el('text',{x:ML+W,y:MT-4,'text-anchor':'middle',
    fill:GOLD,'font-size':8},'target (1.0)'));

  RAND_OACTS.forEach((a,i)=>{
    const y=MT+i*(barH+gap);
    const is5=i===5;
    svg.appendChild(el('rect',{x:ML,y,width:Math.max(a*W,2),height:barH,
      fill:is5?GOLD:HCOL, opacity:is5?0.85:0.55}));
    svg.appendChild(el('text',{x:ML-5,y:y+barH-1,'text-anchor':'end',
      fill:is5?GOLD:'#907060','font-size':9.5},`digit ${i}`));
    svg.appendChild(el('text',{x:ML+a*W+4,y:y+barH-1,
      fill:is5?GOLD:HCOL,'font-size':9},a.toFixed(2)));

    // Gap indicator for digit 5
    if (is5) {
      const bx=ML+a*W+1, tx=ML+W-1;
      svg.appendChild(el('line',{x1:bx,y1:y+barH/2,x2:tx,y2:y+barH/2,
        stroke:'#e06060','stroke-width':1.5,opacity:0.9}));
      svg.appendChild(el('text',{x:(bx+tx)/2,y:y-2,'text-anchor':'middle',
        fill:'#e08080','font-size':8},'gap = 0.49'));
    }
  });

  // X-axis
  svg.appendChild(el('line',{x1:ML,y1:MT+chartH,x2:ML+W,y2:MT+chartH,stroke:AXIS,'stroke-width':1}));
  [0,0.5,1.0].forEach(v=>{
    const x=ML+v*W;
    svg.appendChild(el('line',{x1:x,y1:MT+chartH,x2:x,y2:MT+chartH+4,stroke:AXIS,'stroke-width':1}));
    svg.appendChild(el('text',{x,y:MT+chartH+14,'text-anchor':'middle',fill:TICK,'font-size':9},v.toFixed(1)));
  });

  // MSE calculation section
  const FY=MT+chartH+36;
  svg.appendChild(el('line',{x1:14,y1:FY-8,x2:RW-14,y2:FY-8,stroke:'#5a3020','stroke-width':0.5}));
  svg.appendChild(el('text',{x:20,y:FY+6,fill:'#a06848','font-size':10},'C = ½ Σ (a − y)²'));

  // Two sample terms
  [{d:0,a:RAND_OACTS[0],tgt:0},{d:5,a:RAND_OACTS[5],tgt:1}].forEach(({d,a,tgt},i)=>{
    const sq=(a-tgt)**2;
    svg.appendChild(el('text',{x:20,y:FY+26+i*20,
      fill:d===5?GOLD:HCOL,'font-size':9},
      `digit ${d}: (${a.toFixed(2)} − ${tgt.toFixed(2)})² = ${sq.toFixed(3)}`));
  });
  svg.appendChild(el('text',{x:20,y:FY+66,fill:'#706050','font-size':9},'  ⋯ + 8 more terms'));

  svg.appendChild(el('line',{x1:14,y1:FY+74,x2:RW-14,y2:FY+74,stroke:'#5a3020','stroke-width':0.5}));

  const randC=RAND_OACTS.reduce((s,a,i)=>s+0.5*(a-OTARGET[i])**2,0);
  svg.appendChild(el('text',{x:20,y:FY+89,fill:'#e0c090','font-size':10.5},
    `C ≈ ${randC.toFixed(2)}   ← network is confused`));

  const trainedC=OACTS.reduce((s,a,i)=>s+0.5*(a-OTARGET[i])**2,0);
  svg.appendChild(el('text',{x:20,y:FY+109,fill:OCOL,'font-size':10},
    `After 30 epochs: C ≈ ${trainedC.toFixed(4)}  ← learned`));
}

// ── Generic curve (loss or accuracy) ──
function drawCurve(svg, data, title, col, yMin, yMax, isAcc) {
  svg.appendChild(el('text',{x:RW/2,y:22,'text-anchor':'middle',
    fill:'#a06848','font-size':11,'font-style':'italic'},title));

  const ML=50,MR=16,MT=36,MB=44;
  const W=RW-ML-MR, H=RH-MT-MB;
  const n=data.length;
  const px=i=>ML+i/(n-1)*W;
  const py=v=>MT+H-(v-yMin)/(yMax-yMin)*H;

  const yTicks = isAcc?[0,25,50,75,100]:[0,0.5,1.0,1.5,2.0,2.5];
  yTicks.forEach(v=>{
    svg.appendChild(el('line',{x1:ML,y1:py(v),x2:ML+W,y2:py(v),
      stroke:'#3a1808','stroke-width':0.5,'stroke-dasharray':'2,4'}));
    svg.appendChild(el('text',{x:ML-6,y:py(v)+4,'text-anchor':'end',fill:TICK,'font-size':10},
      isAcc?v+'%':v.toFixed(1)));
  });

  svg.appendChild(el('line',{x1:ML,y1:MT+H,x2:ML+W,y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('line',{x1:ML,y1:MT,   x2:ML,   y2:MT+H,stroke:AXIS,'stroke-width':1}));
  svg.appendChild(el('text',{x:ML+W/2,y:MT+H+30,'text-anchor':'middle',fill:TICK,'font-size':11},'Epoch'));
  [0,9,19,29].forEach(i=>{
    svg.appendChild(el('text',{x:px(i),y:MT+H+16,'text-anchor':'middle',fill:TICK,'font-size':10},String(i+1)));
  });

  const pts=data.map((v,i)=>`${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  svg.appendChild(el('polyline',{points:pts,fill:'none',stroke:col,'stroke-width':2.5}));

  const fv=data[n-1];
  svg.appendChild(el('circle',{cx:px(n-1),cy:py(fv),r:5,fill:GOLD,stroke:'#1a0a08','stroke-width':1.5}));
  svg.appendChild(el('text',{x:px(n-1)-8,y:py(fv)-10,'text-anchor':'end',
    fill:GOLD,'font-size':11,'font-weight':'bold'},
    isAcc?fv+'%':fv.toFixed(2)));
}

// ─── Navigation ───────────────────────────────────────────────────────────────
let cur=0;
function updateNav() {
  const dotsEl=document.getElementById('dots');
  dotsEl.innerHTML='';
  steps.forEach((_,i)=>{
    const d=document.createElement('span');
    d.className='dot'+(i===cur?' active':'');
    d.addEventListener('click',()=>{cur=i;render();});
    dotsEl.appendChild(d);
  });
  document.getElementById('prev').disabled=cur===0;
  document.getElementById('next').disabled=cur===steps.length-1;
  document.getElementById('step-counter').textContent=`${cur+1} / ${steps.length}`;
}
function render() {
  const s=steps[cur];
  document.getElementById('step-title').textContent=s.title;
  document.getElementById('explanation').innerHTML=s.html;
  renderNet(cur);
  renderRight(cur);
  updateNav();
}
document.getElementById('prev').addEventListener('click',()=>{if(cur>0){cur--;render();}});
document.getElementById('next').addEventListener('click',()=>{if(cur<steps.length-1){cur++;render();}});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'&&cur>0){cur--;render();}
  if(e.key==='ArrowRight'&&cur<steps.length-1){cur++;render();}
});
render();
</script>
