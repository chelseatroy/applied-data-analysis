<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Backpropagation: How a Network Learns</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; padding: 24px 24px 80px; font-family: Georgia, serif; background: #faf6f5; color: #2e1a15; }
h1 { font-size: 1.8rem; font-weight: bold; color: #b04030; margin: 0 0 4px; }
#subtitle { color: #805030; font-style: italic; margin-bottom: 20px; }
#step-title { font-size: 1.3rem; font-weight: bold; color: #b04030; margin-bottom: 12px; min-height: 1.6em; }
#panels { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
#explanation { background: #fff; border: 1px solid #e0b0a0; border-radius: 8px; padding: 16px 20px; line-height: 1.75; font-size: 1.05rem; min-height: 90px; }
#nav { position: fixed; bottom: 0; left: 0; right: 0; background: #faf6f5; border-top: 1px solid #e0b0a0; z-index: 100; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 12px 24px 16px; }
button { background: #faf0ee; border: 1px solid #b04030; color: #b04030; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 1.1rem; }
button:hover { background: #f5d8d0; }
button:disabled { opacity: 0.3; cursor: default; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #f0c8b8; display: inline-block; margin: 0 3px; cursor: pointer; transition: background 0.2s; }
.dot.active { background: #b04030; }
#step-counter { color: #805030; font-size: 0.9rem; margin-left: 16px; }
</style>
</head>
<body>
<h1>Backpropagation: How a Network Learns</h1>
<div id="subtitle">One complete training step traced with a concrete example</div>
<div id="step-title"></div>
<div id="panels">
  <svg id="netsvg"   width="510" height="360" style="background:#1a0e08;border-radius:8px;flex-shrink:0"></svg>
  <svg id="rightsvg" width="295" height="360" style="background:#1a0e08;border-radius:8px;flex-shrink:0"></svg>
</div>
<div id="explanation"></div>
<div id="nav">
  <button id="prev">&#8592;</button>
  <div id="dots"></div>
  <button id="next">&#8594;</button>
  <span id="step-counter"></span>
</div>

<script>
// ── Colors ────────────────────────────────────────────────────────────────────
const ICOL = '#4a9fd4', HCOL = '#e08040', OCOL = '#50c878';
const GOLD = '#f0c040', BLAME = '#e06070', UCOL = '#50c0d8';
const TICK = '#806050', WPOS = '#c09060', WNEG = '#607098';

// ── Network values ────────────────────────────────────────────────────────────
const X1 = 0.9, X2 = 0.3, TGT = 1.0;
const AH1 = 0.662, AH2 = 0.435;
const AO = 0.568, AON = 0.576;
const COST = 0.093, COSTN = 0.090;

const W  = { w11:  0.500, w21:  0.400, w12: -0.300, w22:  0.700, v1:  0.600, v2: -0.400 };
const WN = { w11:  0.506, w21:  0.402, w12: -0.305, w22:  0.698, v1:  0.635, v2: -0.377 };

// ── Node positions ────────────────────────────────────────────────────────────
const R  = 26;
const I1 = {cx: 80,  cy: 145};
const I2 = {cx: 80,  cy: 245};
const H1 = {cx: 265, cy: 145};
const H2 = {cx: 265, cy: 245};
const OO = {cx: 445, cy: 195};

// ── SVG helpers ───────────────────────────────────────────────────────────────
function el(tag, attrs = {}, txt = '') {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (txt) e.textContent = txt;
  return e;
}
function stxt(svg, x, y, s, fill, size = 10, bold = false, anchor = 'start') {
  const a = {x, y, fill, 'font-size': size, 'text-anchor': anchor};
  if (bold) a['font-weight'] = 'bold';
  svg.appendChild(el('text', a, s));
}

// Edge point on circle surface, facing toward target node
function ep(from, to) {
  const dx = to.cx - from.cx, dy = to.cy - from.cy;
  const len = Math.hypot(dx, dy);
  return {x: from.cx + dx / len * R, y: from.cy + dy / len * R};
}

// Add arrow marker for blame (backward) connections
function addDefs(svg) {
  const defs = el('defs');
  const mk = el('marker', {id: 'arr', markerWidth: 7, markerHeight: 6, refX: 7, refY: 3, orient: 'auto'});
  mk.appendChild(el('path', {d: 'M0,0 L7,3 L0,6 z', fill: BLAME, opacity: 0.9}));
  defs.appendChild(mk);
  svg.appendChild(defs);
}

// Draw a weighted connection
function drawConn(svg, from, to, weight, mode) {
  const p1 = ep(from, to);  // edge of source node, facing target
  const p2 = ep(to, from);  // edge of target node, facing source

  if (mode === 'blame') {
    // Draw backward: from target side toward source side, arrow at source
    svg.appendChild(el('line', {
      x1: p2.x, y1: p2.y, x2: p1.x, y2: p1.y,
      stroke: BLAME, 'stroke-width': 2.5, opacity: 0.85,
      'stroke-dasharray': '6,4', 'marker-end': 'url(#arr)'
    }));
    return;
  }

  const thick = Math.abs(weight) * 6.5 + 0.8;
  const pos = weight >= 0;
  let stroke, opacity;
  if      (mode === 'active')  { stroke = pos ? '#f0b870' : '#80b8f0'; opacity = 1.0; }
  else if (mode === 'dim')     { stroke = pos ? '#3a2410' : '#182035'; opacity = 0.7; }
  else if (mode === 'updated') { stroke = UCOL; opacity = 0.85; }
  else                         { stroke = pos ? WPOS : WNEG; opacity = 0.80; }

  svg.appendChild(el('line', {x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, stroke, 'stroke-width': thick, opacity}));
}

// Draw a neuron with glow proportional to activation
function drawNeuron(svg, node, act, color, label, sublabel) {
  const {cx, cy} = node;
  const a = Math.max(0, Math.min(1, act));
  if (a > 0.05) {
    svg.appendChild(el('circle', {cx, cy, r: R + 16, fill: color, opacity: a * 0.07}));
    svg.appendChild(el('circle', {cx, cy, r: R + 8,  fill: color, opacity: a * 0.16}));
  }
  svg.appendChild(el('circle', {cx, cy, r: R, fill: color, 'fill-opacity': 0.06 + a * 0.80,
    stroke: color, 'stroke-width': 1.5, 'stroke-opacity': 0.45 + a * 0.55}));
  const tc = a > 0.45 ? '#fff' : '#888';
  if (label)    stxt(svg, cx, cy + (sublabel ? -5 : 5), label,    tc, 10,   true, 'middle');
  if (sublabel) stxt(svg, cx, cy + 11,                  sublabel, tc, 10.5, true, 'middle');
}

// Dashed gold ring showing the target activation
function drawTarget(svg) {
  const {cx, cy} = OO;
  svg.appendChild(el('circle', {cx, cy, r: R + 9, fill: 'none', stroke: GOLD,
    'stroke-width': 1.5, 'stroke-dasharray': '5,3', opacity: 0.9}));
  stxt(svg, cx, cy - R - 14, 'target: 1.0', GOLD, 9, true, 'middle');
}

function layerLabels(svg) {
  stxt(svg, I1.cx, 342, 'Input',  TICK, 9, false, 'middle');
  stxt(svg, H1.cx, 342, 'Hidden', TICK, 9, false, 'middle');
  stxt(svg, OO.cx, 342, 'Output', TICK, 9, false, 'middle');
}

// ── RENDER NETWORK ────────────────────────────────────────────────────────────
function renderNet(si) {
  const svg = document.getElementById('netsvg');
  svg.innerHTML = '';
  addDefs(svg);

  const act = {i1: 0, i2: 0, h1: 0, h2: 0, o: 0};
  let cm = {i1h1: 'rest', i2h1: 'rest', i1h2: 'rest', i2h2: 'rest', h1o: 'rest', h2o: 'rest'};
  let showTgt = false, useNew = false;

  if (si >= 1) { act.i1 = X1; act.i2 = X2; }
  if (si >= 2) { act.h1 = AH1; act.h2 = AH2; }
  if (si >= 3) { act.o = si >= 8 ? AON : AO; }

  if      (si === 1) { cm = {i1h1:'dim',    i2h1:'dim',    i1h2:'dim',    i2h2:'dim',    h1o:'dim',    h2o:'dim'   }; }
  else if (si === 2) { cm = {i1h1:'active', i2h1:'active', i1h2:'active', i2h2:'active', h1o:'dim',    h2o:'dim'   }; }
  else if (si === 3) { cm = {i1h1:'rest',   i2h1:'rest',   i1h2:'rest',   i2h2:'rest',   h1o:'active', h2o:'active'}; }
  else if (si === 4) { showTgt = true;
                       cm = {i1h1:'dim',    i2h1:'dim',    i1h2:'dim',    i2h2:'dim',    h1o:'dim',    h2o:'dim'   }; }
  else if (si === 5) { showTgt = true;
                       cm = {i1h1:'dim',    i2h1:'dim',    i1h2:'dim',    i2h2:'dim',    h1o:'blame',  h2o:'blame' }; }
  else if (si === 6) { cm = {i1h1:'blame',  i2h1:'blame',  i1h2:'blame',  i2h2:'blame',  h1o:'dim',    h2o:'dim'   }; }
  else if (si === 7) { useNew = true;
                       cm = {i1h1:'updated',i2h1:'updated',i1h2:'updated',i2h2:'updated',h1o:'updated',h2o:'updated'}; }
  else if (si === 8) { useNew = true; }

  const wt = useNew ? WN : W;

  // Connections behind neurons
  drawConn(svg, I1, H1, wt.w11, cm.i1h1);
  drawConn(svg, I2, H1, wt.w21, cm.i2h1);
  drawConn(svg, I1, H2, wt.w12, cm.i1h2);
  drawConn(svg, I2, H2, wt.w22, cm.i2h2);
  drawConn(svg, H1, OO, wt.v1,  cm.h1o);
  drawConn(svg, H2, OO, wt.v2,  cm.h2o);

  if (showTgt) drawTarget(svg);

  const sub = v => v > 0 ? v.toFixed(2) : null;
  drawNeuron(svg, I1, act.i1, ICOL, 'in₁', sub(act.i1));
  drawNeuron(svg, I2, act.i2, ICOL, 'in₂', sub(act.i2));
  drawNeuron(svg, H1, act.h1, HCOL, 'h₁',  sub(act.h1));
  drawNeuron(svg, H2, act.h2, HCOL, 'h₂',  sub(act.h2));
  drawNeuron(svg, OO, act.o,  OCOL, 'out',  sub(act.o));

  layerLabels(svg);

  // Step 0: reading guide inside network panel
  if (si === 0) {
    stxt(svg, 18, 298, '── warm / thick: positive weight', WPOS, 9);
    stxt(svg, 18, 314, '── cool / thick: negative weight', WNEG, 9);
    stxt(svg, 18, 330, '●   brighter glow = more active',  '#a08060', 9);
  }
}

// ── RIGHT PANEL helpers ───────────────────────────────────────────────────────
const RW = 295;

function rtxt(svg, x, y, s, fill, size = 10, bold = false, anchor = 'start') {
  const a = {x, y, fill, 'font-size': size, 'text-anchor': anchor};
  if (bold) a['font-weight'] = 'bold';
  svg.appendChild(el('text', a, s));
}
function rsep(svg, y) {
  svg.appendChild(el('line', {x1: 14, y1: y, x2: RW - 14, y2: y, stroke: '#5a3020', 'stroke-width': 0.5}));
}
function mono(svg, x, y, s, fill, size = 9, bold = false) {
  const a = {x, y, fill, 'font-size': size, 'font-family': "'Courier New', monospace"};
  if (bold) a['font-weight'] = 'bold';
  svg.appendChild(el('text', a, s));
}
function rbar(svg, x, y, val, maxW, color, label, valStr) {
  svg.appendChild(el('rect', {x, y: y - 2, width: maxW, height: 16, fill: '#2a1208', rx: 3}));
  if (val > 0) svg.appendChild(el('rect', {x, y: y - 2, width: Math.round(val * maxW), height: 16, fill: color, 'fill-opacity': 0.85, rx: 3}));
  rtxt(svg, x - 6, y + 10, label, TICK, 9.5, false, 'end');
  if (valStr !== undefined) rtxt(svg, x + maxW + 6, y + 10, valStr, color, 10, true);
}

// ── RIGHT PANEL per step ──────────────────────────────────────────────────────

function drawR0(svg) {
  rtxt(svg, RW / 2, 20, 'How to read this diagram', TICK, 10, true, 'middle');
  rsep(svg, 28);
  rtxt(svg, 18, 50, 'Connections:', '#c09060', 9.5, true);
  svg.appendChild(el('line', {x1: 18, y1: 66, x2: 160, y2: 66, stroke: '#f0b870', 'stroke-width': 5, opacity: 0.9}));
  rtxt(svg, 166, 71, 'positive weight', WPOS, 9);
  svg.appendChild(el('line', {x1: 18, y1: 88, x2: 160, y2: 88, stroke: '#80b8f0', 'stroke-width': 5, opacity: 0.9}));
  rtxt(svg, 166, 93, 'negative weight', WNEG, 9);
  svg.appendChild(el('line', {x1: 18, y1: 108, x2: 80, y2: 108, stroke: '#f0b870', 'stroke-width': 7, opacity: 0.9}));
  svg.appendChild(el('line', {x1: 100, y1: 108, x2: 160, y2: 108, stroke: '#f0b870', 'stroke-width': 2, opacity: 0.9}));
  rtxt(svg, 166, 113, 'thicker = stronger', WPOS, 9);
  rsep(svg, 126);
  rtxt(svg, 18, 146, 'Neurons:', '#c09060', 9.5, true);
  svg.appendChild(el('circle', {cx: 36, cy: 172, r: 16, fill: OCOL, 'fill-opacity': 0.85, stroke: OCOL, 'stroke-width': 1.5, 'stroke-opacity': 0.9}));
  svg.appendChild(el('circle', {cx: 36, cy: 172, r: 24, fill: OCOL, opacity: 0.15}));
  rtxt(svg, 60, 177, 'active (bright)', OCOL, 9);
  svg.appendChild(el('circle', {cx: 36, cy: 212, r: 16, fill: OCOL, 'fill-opacity': 0.07, stroke: OCOL, 'stroke-width': 1.5, 'stroke-opacity': 0.45}));
  rtxt(svg, 60, 217, 'inactive (dark)', TICK, 9);
  rsep(svg, 236);
  rtxt(svg, 18, 256, 'Backward pass:', '#c09060', 9.5, true);
  svg.appendChild(el('line', {x1: 18, y1: 274, x2: 160, y2: 274, stroke: BLAME, 'stroke-width': 2.5, 'stroke-dasharray': '6,4', opacity: 0.85}));
  rtxt(svg, 166, 279, 'blame signal', BLAME, 9);
  svg.appendChild(el('line', {x1: 18, y1: 296, x2: 100, y2: 296, stroke: UCOL, 'stroke-width': 2.5, opacity: 0.85}));
  rtxt(svg, 166, 301, 'updated weight', UCOL, 9);
}

function drawR1(svg) {
  rtxt(svg, RW / 2, 20, 'Training example', TICK, 10, true, 'middle');
  rsep(svg, 28);
  const bx = 82, mw = 174;
  rbar(svg, bx, 52,  X1,  mw, ICOL, 'input 1', '0.90');
  rbar(svg, bx, 80,  X2,  mw, ICOL, 'input 2', '0.30');
  rsep(svg, 108);
  rbar(svg, bx, 130, TGT, mw, GOLD, 'target output', '1.00');
  rsep(svg, 160);
  rtxt(svg, 18, 180, 'The output should reach 1.0', TICK, 9.5);
  rtxt(svg, 18, 198, '(fully lit) for this example.', TICK, 9.5);
  rtxt(svg, 18, 220, 'The network hasn\'t computed', TICK, 9.5);
  rtxt(svg, 18, 238, 'anything yet — it\'s just', TICK, 9.5);
  rtxt(svg, 18, 256, 'taking in the inputs.', TICK, 9.5);
}

function drawR2(svg) {
  rtxt(svg, RW / 2, 18, 'Computing h1 and h2', TICK, 10, true, 'middle');
  rsep(svg, 26);

  // ── h1 ──────────────────────────────────────────────────
  rtxt(svg, 14, 41, 'h1', HCOL, 9.5, true);
  mono(svg, 14, 57,  'in1(0.90)', ICOL,      9, true);
  mono(svg, 78, 57,  '×',         TICK,      9);
  mono(svg, 88, 57,  '(+0.500)',  WPOS,      9, true);
  mono(svg, 144, 57, '=',         TICK,      9);
  mono(svg, 154, 57, '+0.450',    '#70c870', 9, true);
  mono(svg, 14, 72,  'in2(0.30)', ICOL,      9, true);
  mono(svg, 78, 72,  '×',         TICK,      9);
  mono(svg, 88, 72,  '(+0.400)',  WPOS,      9, true);
  mono(svg, 144, 72, '=',         TICK,      9);
  mono(svg, 154, 72, '+0.120',    '#70c870', 9, true);
  mono(svg, 88, 87,  '   bias',   TICK,      9);
  mono(svg, 144, 87, '=',         TICK,      9);
  mono(svg, 154, 87, '+0.100',    '#70c870', 9, true);
  rsep(svg, 95);
  mono(svg, 88, 107,  '  total',  TICK,      9, true);
  mono(svg, 144, 107, '=',        TICK,      9);
  mono(svg, 154, 107, '+0.670',   HCOL,      9.5, true);
  rtxt(svg, 14, 122,  'sigmoid(0.670)', TICK, 9);
  rtxt(svg, 144, 122, '→',  TICK, 9);
  rtxt(svg, 154, 122, '0.662', HCOL, 10, true);
  svg.appendChild(el('rect', {x: 202, y: 112, width: 72, height: 13, fill: '#2a1208', rx: 2}));
  svg.appendChild(el('rect', {x: 202, y: 112, width: Math.round(AH1 * 72), height: 13, fill: HCOL, 'fill-opacity': 0.8, rx: 2}));

  rsep(svg, 134);

  // ── h2 ──────────────────────────────────────────────────
  rtxt(svg, 14, 149, 'h2', HCOL, 9.5, true);
  mono(svg, 14, 165,  'in1(0.90)', ICOL,      9, true);
  mono(svg, 78, 165,  '×',         TICK,      9);
  mono(svg, 88, 165,  '(−0.300)',  WNEG,      9, true);
  mono(svg, 144, 165, '=',         TICK,      9);
  mono(svg, 154, 165, '−0.270',    BLAME,     9, true);
  rtxt(svg, 207, 165, '← large!',  BLAME,     8, true);
  mono(svg, 14, 180,  'in2(0.30)', ICOL,      9, true);
  mono(svg, 78, 180,  '×',         TICK,      9);
  mono(svg, 88, 180,  '(+0.700)',  WPOS,      9, true);
  mono(svg, 144, 180, '=',         TICK,      9);
  mono(svg, 154, 180, '+0.210',    '#70c870', 9, true);
  mono(svg, 88, 195,  '   bias',   TICK,      9);
  mono(svg, 144, 195, '=',         TICK,      9);
  mono(svg, 154, 195, '−0.200',    '#d07070', 9, true);
  rsep(svg, 203);
  mono(svg, 88, 215,  '  total',   TICK,      9, true);
  mono(svg, 144, 215, '=',         TICK,      9);
  mono(svg, 154, 215, '−0.260',    '#d07070', 9.5, true);
  rtxt(svg, 14, 230,  'sigmoid(−0.260)', TICK, 9);
  rtxt(svg, 144, 230, '→',  TICK, 9);
  rtxt(svg, 154, 230, '0.435', HCOL, 10, true);
  svg.appendChild(el('rect', {x: 202, y: 220, width: 72, height: 13, fill: '#2a1208', rx: 2}));
  svg.appendChild(el('rect', {x: 202, y: 220, width: Math.round(AH2 * 72), height: 13, fill: HCOL, 'fill-opacity': 0.8, rx: 2}));

  rsep(svg, 244);
  rtxt(svg, 14, 260, 'in1 is bright (0.90) — even through', TICK, 9);
  rtxt(svg, 14, 276, 'the negative connection, its pull', TICK, 9);
  rtxt(svg, 14, 292, 'on h2 beats in2\'s push.', TICK, 9);
}

function drawR3(svg) {
  rtxt(svg, RW / 2, 18, 'Computing the output', TICK, 10, true, 'middle');
  rsep(svg, 26);

  rtxt(svg, 14, 41, 'out', OCOL, 9.5, true);
  mono(svg, 14, 57,  'h1 (0.662)', HCOL,      9, true);
  mono(svg, 84, 57,  '×',          TICK,      9);
  mono(svg, 94, 57,  '(+0.600)',   WPOS,      9, true);
  mono(svg, 150, 57, '=',          TICK,      9);
  mono(svg, 160, 57, '+0.397',     '#70c870', 9, true);
  mono(svg, 14, 72,  'h2 (0.435)', HCOL,      9, true);
  mono(svg, 84, 72,  '×',          TICK,      9);
  mono(svg, 94, 72,  '(−0.400)',   WNEG,      9, true);
  mono(svg, 150, 72, '=',          TICK,      9);
  mono(svg, 160, 72, '−0.174',     BLAME,     9, true);
  mono(svg, 94, 87,  '   bias',    TICK,      9);
  mono(svg, 150, 87, '=',          TICK,      9);
  mono(svg, 160, 87, '+0.050',     '#70c870', 9, true);
  rsep(svg, 95);
  mono(svg, 94, 107,  '  total',   TICK,      9, true);
  mono(svg, 150, 107, '=',         TICK,      9);
  mono(svg, 160, 107, '+0.273',    OCOL,      9.5, true);
  rtxt(svg, 14, 122,  'sigmoid(0.273)', TICK, 9);
  rtxt(svg, 150, 122, '→',  TICK, 9);
  rtxt(svg, 160, 122, '0.568', OCOL, 10, true);
  svg.appendChild(el('rect', {x: 208, y: 112, width: 72, height: 13, fill: '#2a1208', rx: 2}));
  svg.appendChild(el('rect', {x: 208, y: 112, width: Math.round(AO * 72), height: 13, fill: OCOL, 'fill-opacity': 0.8, rx: 2}));

  rsep(svg, 134);

  // Gap visualization
  const bx = 62, mw = 190;
  rbar(svg, bx, 154, TGT, mw, GOLD, 'target', '1.000');
  rbar(svg, bx, 180, AO,  mw, OCOL, 'output', '0.568');
  const gapX = bx + Math.round(AO * mw);
  const gapW = Math.round((TGT - AO) * mw);
  svg.appendChild(el('rect', {x: gapX, y: 178, width: gapW, height: 16, fill: BLAME, 'fill-opacity': 0.38, rx: 2}));
  rtxt(svg, gapX + gapW / 2, 208, 'gap: 0.432', BLAME, 9, true, 'middle');
}

function drawR4(svg) {
  rtxt(svg, RW / 2, 20, 'The gap', TICK, 10, true, 'middle');
  rsep(svg, 28);
  const bx = 82, mw = 174;
  rbar(svg, bx, 52,  TGT, mw, GOLD, 'target', '1.00');
  rbar(svg, bx, 80,  AO,  mw, OCOL, 'output', '0.57');
  // Highlight the gap
  const gapX = bx + Math.round(AO * mw);
  const gapW = Math.round((TGT - AO) * mw);
  svg.appendChild(el('rect', {x: gapX, y: 78, width: gapW, height: 16, fill: BLAME, 'fill-opacity': 0.38, rx: 2}));
  rtxt(svg, gapX + gapW / 2, 106, 'gap: 0.43', BLAME, 9, true, 'middle');
  rsep(svg, 120);
  rtxt(svg, 18, 140, 'Output was 0.43 short of target.', TICK, 9.5);
  rtxt(svg, 18, 160, 'Bigger gap = bigger push to fix.', TICK, 9.5);
  rsep(svg, 178);
  rtxt(svg, 18, 198, 'Cost = (gap)² ÷ 2', '#c09060', 9.5);

// ── NAVIGATION ────────────────────────────────────────────────────────────────
let cur = 0;

function updateNav() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  steps.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === cur ? ' active' : '');
    d.addEventListener('click', () => { cur = i; render(); });
    dotsEl.appendChild(d);
  });
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === steps.length - 1;
  document.getElementById('step-counter').textContent = `${cur + 1} / ${steps.length}`;
}

function render() {
  document.getElementById('step-title').textContent = steps[cur].title;
  document.getElementById('explanation').innerHTML = steps[cur].html;
  renderNet(cur);
  renderRight(cur);
  updateNav();
}

document.getElementById('prev').addEventListener('click', () => { if (cur > 0) { cur--; render(); } });
document.getElementById('next').addEventListener('click', () => { if (cur < steps.length - 1) { cur++; render(); } });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && cur > 0)                 { cur--; render(); }
  if (e.key === 'ArrowRight' && cur < steps.length - 1)  { cur++; render(); }
});

render();
</script>
